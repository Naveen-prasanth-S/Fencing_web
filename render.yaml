services:
  - type: web
    name: fencingms
    runtime: node
    buildCommand: npm install && npm --prefix backend install && npm run build
    startCommand: node backend/server.js
    healthCheckPath: /health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
